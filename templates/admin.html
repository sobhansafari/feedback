<!DOCTYPE html>
<html>
<head>
    <title>داشبورد مدیریت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📊 داشبورد مدیریت فیدبک‌ها</h2>
            <a href="/" class="btn btn-outline-primary">ثبت فیدبک جدید</a>
        </div>
        
        <div class="card shadow">
            <div class="card-body">
                <div id="feedbackList"></div>
            </div>
        </div>
    </div>

    <script>
        const statuses = ['ثبت شده', 'در حال بررسی', 'رسیدگی شده'];
        const statusColors = {
            'ثبت شده': 'secondary',
            'در حال بررسی': 'warning',
            'رسیدگی شده': 'success'
        };

        async function loadFeedbacks() {
            const response = await fetch('/api/feedbacks');
            const feedbacks = await response.json();
            
            const container = document.getElementById('feedbackList');
            if (feedbacks.length === 0) {
                container.innerHTML = '<div class="alert alert-info">هیچ فیدبکی ثبت نشده است.</div>';
                return;
            }
            
            let html = '<div class="list-group">';
            feedbacks.forEach(f => {
                html += 
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">${f.title}</h5>
                                <p class="mb-1 text-muted">${f.message}</p>
                                <small class="text-muted">${f.created_at}</small>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <span class="badge bg-${statusColors[f.status]}">${f.status}</span>
                                <select class="form-select form-select-sm" style="width:130px" 
                                        onchange="updateStatus(${f.id}, this.value)">
                                    ${statuses.map(s => 
                                        <option value="${s}" ${s === f.status ? 'selected' : ''}>${s}</option>
                                    ).join('')}
                                </select>
                            </div>
                        </div>
                    </div>
                ;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function updateStatus(id, newStatus) {
            const response = await fetch(/api/feedbacks/${id}, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: newStatus})
            });
            if (response.ok) {
                loadFeedbacks();
            } else {
                alert('خطا در به‌روزرسانی وضعیت');
            }
        }

        loadFeedbacks();
    </script>
</body>
</html>
