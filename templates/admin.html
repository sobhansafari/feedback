<!DOCTYPE html>
<html>
<head>
    <title>داشبورد مدیریت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>مدیریت فیدبک‌ها</h2>
        <a href="/" class="btn btn-primary mb-3">ثبت فیدبک جدید</a>
        <div id="feedbackList" class="mt-3"></div>
    </div>

    <script>
        // لیست وضعیت‌ها
        var statuses = ['ثبت شده', 'در حال بررسی', 'رسیدگی شده'];

        // تابع بارگذاری
        function loadFeedbacks() {
            fetch('/api/feedbacks')
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    var container = document.getElementById('feedbackList');
                    
                    // اگر داده خالی بود
                    if (data.length === 0) {
                        container.innerHTML = '<div class="alert alert-info">هیچ فیدبکی ثبت نشده است.</div>';
                        return;
                    }
                    
                    // ساخت لیست
                    var html = '<div class="list-group">';
                    for (var i = 0; i < data.length; i++) {
                        var f = data[i];
                        html += '<div class="list-group-item">';
                        html += '<h5>' + f.title + '</h5>';
                        html += '<p>' + f.message + '</p>';
                        html += '<small>' + f.created_at + '</small><br>';
                        html += '<span class="badge bg-secondary">' + f.status + '</span>';
                        html += ' <select class="form-select d-inline-block w-auto mt-2" onchange="updateStatus(' + f.id + ', this.value)">';
                        for (var j = 0; j < statuses.length; j++) {
                            var s = statuses[j];
                            if (s === f.status) {
                                html += '<option value="' + s + '" selected>' + s + '</option>';
                            } else {
                                html += '<option value="' + s + '">' + s + '</option>';
                            }
                        }
                        html += '</select>';
                        html += '</div>';
                    }
                    html += '</div>';
                    container.innerHTML = html;
                })
                .catch(function(error) {
                    document.getElementById('feedbackList').innerHTML = '<div class="alert alert-danger">خطا: ' + error + '</div>';
                });
        }

        // تابع به‌روزرسانی وضعیت
        function updateStatus(id, newStatus) {
            fetch('/api/feedbacks/' + id, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({status: newStatus})
            })
            .then(function(response) {
                if (response.ok) {
                    loadFeedbacks();
                } else {
                    alert('خطا در به‌روزرسانی');
                }
            })
            .catch(function(error) {
                alert('خطا: ' + error);
            });
        }

        // وقتی صفحه لود شد، اجرا کن
        window.onload = loadFeedbacks;
    </script>
</body>
</html>
