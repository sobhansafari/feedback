<!DOCTYPE html>
<html>
<head>
    <title>ثبت فیدبک</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4">📝 ثبت فیدبک جدید</h2>
                <div class="card shadow">
                    <div class="card-body">
                        <form id="feedbackForm">
                            <div class="mb-3">
                                <label class="form-label">عنوان</label>
                                <input type="text" id="title" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">متن پیام</label>
                                <textarea id="message" class="form-control" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">ارسال فیدبک</button>
                        </form>
                        <div id="messageAlert" class="mt-3"></div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="/admin" class="btn btn-outline-secondary">رفتن به داشبورد مدیریت</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;
            
            const response = await fetch('/api/feedbacks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, message})
            });
            
            if (response.ok) {
                document.getElementById('messageAlert').innerHTML = 
                    '<div class="alert alert-success">✅ فیدبک با موفقیت ثبت شد!</div>';
                document.getElementById('feedbackForm').reset();
            } else {
                document.getElementById('messageAlert').innerHTML = 
                    '<div class="alert alert-danger">❌ خطا در ثبت فیدبک</div>';
            }
        });
    </script>
</body>
</html>
